name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install
        run: pip install -e ".[dev]"
      - name: Ruff
        run: ruff check .
      - name: Tests
        # The default suite is credential- and infrastructure-free: the four
        # safety classes are proved against an in-memory store and a simulated
        # target. Postgres integration and the subprocess crash matrix are
        # separate, opt-in jobs added with those milestones.
        run: pytest -q
