name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install
        run: pip install -e ".[dev]"
      - name: Ruff
        run: ruff check .
      - name: Tests
        # The default suite is credential- and infrastructure-free: it proves
        # the safety classes in-process and runs the SQLite subprocess crash
        # matrix without any service container.
        run: pytest -q

  postgres:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: effect_broker
          POSTGRES_PASSWORD: effect_broker
          POSTGRES_DB: effect_broker_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U effect_broker -d effect_broker_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      EFFECT_BROKER_TEST_DSN: >-
        postgresql://effect_broker:effect_broker@localhost:5432/effect_broker_test
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Install
        run: pip install -e ".[dev]"
      - name: Migrate
        run: alembic upgrade head
      - name: Postgres tests
        run: >-
          pytest -q tests/test_store_conformance.py
          tests/integration/test_postgres_crash.py
